<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expressions a.d — License Admin</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #0b0f15; color: #e8eef5; min-height: 100vh; padding: 0; margin: 0; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; }
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
    .admin-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .admin-hdr h1 { font-size: 22px; }
    .admin-hdr a { color: #3d8bff; text-decoration: none; font-size: 13px; }

    .lock-screen { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
    .lock-card { background: #131a24; border: 1px solid rgba(255,255,255,.12); border-radius: 14px; padding: 36px; max-width: 360px; width: 100%; text-align: center; }
    .lock-card h2 { margin-bottom: 8px; font-size: 18px; }
    .lock-card p  { font-size: 12px; color: rgba(255,255,255,.55); margin-bottom: 18px; }
    .lock-card input { width: 100%; padding: 11px; background: #0b0f15; border: 1px solid rgba(255,255,255,.12); color: #e8eef5; border-radius: 6px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .lock-card input:focus { border-color: #3d8bff; }
    .lock-card button { width: 100%; padding: 12px; background: linear-gradient(135deg, #2868d4, #3d8bff); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .lock-msg { color: #e74c3c; margin-top: 10px; font-size: 12px; min-height: 16px; }

    .panels { display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; }
    @media (max-width: 850px) { .panels { grid-template-columns: 1fr; } }

    .panel { background: #131a24; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 24px; }
    .panel h2 { font-size: 15px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,.06); }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; color: rgba(255,255,255,.6); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
    .field input { width: 100%; padding: 9px 12px; background: #0b0f15; border: 1px solid rgba(255,255,255,.12); color: #e8eef5; border-radius: 5px; font-size: 13px; outline: none; }
    .field input:focus { border-color: #3d8bff; }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }

    .gen-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #2868d4, #3d8bff); color: #fff; font-size: 13px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; transition: .15s ease; }
    .gen-btn:hover { box-shadow: 0 4px 16px rgba(61,139,255,.3); }

    .result-card { margin-top: 18px; padding: 16px; background: #0b0f15; border: 1px dashed rgba(255,255,255,.12); border-radius: 8px; text-align: center; display: none; }
    .result-card.show { display: block; }
    .result-key { font-family: 'Consolas', monospace; font-size: 13px; color: #2ecc71; word-break: break-all; padding: 10px; background: rgba(46,204,113,.05); border-radius: 6px; margin-bottom: 10px; }
    .result-exp { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 12px; }
    .copy-btn { padding: 8px 16px; background: #2ecc71; color: #fff; border: none; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; }

    .history-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history-tbl th, .history-tbl td { padding: 10px 8px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.05); }
    .history-tbl th { color: rgba(255,255,255,.5); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .history-tbl .key-cell { font-family: 'Consolas', monospace; color: #3d8bff; font-size: 10px; }
    .del-btn { background: #e74c3c; color: #fff; border: none; padding: 4px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; }
    .empty-hist { text-align: center; padding: 30px; color: rgba(255,255,255,.3); font-style: italic; font-size: 12px; }
  </style>
</head>
<body>

<!-- ── PASSWORD LOCK ── -->
<div id="lock" class="lock-screen">
  <div class="lock-card">
    <h2>🔐 Admin Access</h2>
    <p>Enter password to access license generator.</p>
    <input type="password" id="pwInput" placeholder="Admin password" autocomplete="off" />
    <button id="pwBtn">Unlock</button>
    <div class="lock-msg" id="pwMsg"></div>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="admin" class="admin-wrap" style="display:none">
  <div class="admin-hdr">
    <h1>🔑 License Admin</h1>
    <a href="index.html">← Back to site</a>
  </div>

  <div class="panels">
    <!-- Generator -->
    <div class="panel">
      <h2>Generate New License</h2>
      <div class="field">
        <label>Customer Name / Email / Note</label>
        <input type="text" id="noteInput" placeholder="e.g., John Doe — order #1234" />
      </div>
      <div class="row">
        <div class="field"><label>Days</label>
          <input type="number" id="daysInput" value="365" min="0" max="36500" /></div>
        <div class="field"><label>Hours</label>
          <input type="number" id="hoursInput" value="0" min="0" max="24" /></div>
        <div class="field"><label>Minutes</label>
          <input type="number" id="minsInput" value="0" min="0" max="60" /></div>
      </div>
      <button class="gen-btn" id="genBtn">⚡ Generate Key</button>

      <div class="result-card" id="result">
        <div class="result-key" id="resultKey"></div>
        <div class="result-exp" id="resultExp"></div>
        <button class="copy-btn" id="copyBtn">📋 Copy Key</button>
      </div>
    </div>

    <!-- History -->
    <div class="panel">
      <h2>Generated Keys (<span id="histCount">0</span>)</h2>
      <table class="history-tbl">
        <thead><tr><th>Customer</th><th>Key</th><th>Expires</th><th></th></tr></thead>
        <tbody id="histBody"></tbody>
      </table>
      <div class="empty-hist" id="emptyHist">No keys generated yet.</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════ CONFIG ═══════════════════
const SECRET_SALT = 'ExpressionsLib2026_xYz!!_SuperSecret_1a2b3c4d';
// CHANGE THIS to your own admin password (basic gate)
const ADMIN_PASS  = 'f92e2c6e0ceb9bf5';
const HIST_KEY    = 'exal_admin_history';

// ═══════════════════ PASSWORD GATE ═══════════════════
document.getElementById('pwBtn').addEventListener('click', tryUnlock);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

function tryUnlock() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASS) {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('admin').style.display = '';
    sessionStorage.setItem('exal_admin_unlocked', '1');
    renderHistory();
  } else {
    document.getElementById('pwMsg').textContent = '✗ Wrong password';
  }
}
if (sessionStorage.getItem('exal_admin_unlocked') === '1') {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('admin').style.display = '';
  renderHistory();
}

// ═══════════════════ KEY GENERATOR ═══════════════════
async function generateKey(days, hours, minutes) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey(
    'raw', enc.encode(SECRET_SALT),
    { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  const now = Date.now();
  const ms  = (days * 86400000) + (hours * 3600000) + (minutes * 60000);
  const expMs = now + ms;
  const expHex = expMs.toString(16).padStart(12, '0').toUpperCase();
  const rand = new Uint8Array(4);
  crypto.getRandomValues(rand);
  const nonce = Array.from(rand).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
  const payload = expHex + nonce;
  const sigBuf = await crypto.subtle.sign('HMAC', keyMat, enc.encode(payload));
  const hashHex = Array.from(new Uint8Array(sigBuf)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
  const sig = hashHex.substring(0, 16);
  const raw = 'EXAL' + payload + sig;
  const formatted = raw.match(/.{1,4}/g).join('-');
  return { key: formatted, expMs, expStr: new Date(expMs).toLocaleString() };
}

document.getElementById('genBtn').addEventListener('click', async () => {
  const days  = parseInt(document.getElementById('daysInput').value, 10) || 0;
  const hours = parseInt(document.getElementById('hoursInput').value, 10) || 0;
  const mins  = parseInt(document.getElementById('minsInput').value, 10) || 0;
  const note  = document.getElementById('noteInput').value.trim();

  if (days === 0 && hours === 0 && mins === 0) return alert('Enter a duration.');

  const r = await generateKey(days, hours, mins);
  document.getElementById('resultKey').textContent = r.key;
  document.getElementById('resultExp').textContent = `Expires: ${r.expStr}`;
  document.getElementById('result').classList.add('show');

  saveHistory({
    id: Date.now().toString(),
    note: note || 'Unnamed',
    key: r.key,
    expStr: r.expStr,
    createdStr: new Date().toLocaleString()
  });
  document.getElementById('noteInput').value = '';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const k = document.getElementById('resultKey').textContent;
  navigator.clipboard.writeText(k).then(() => {
    document.getElementById('copyBtn').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copyBtn').textContent = '📋 Copy Key', 1500);
  });
});

// ═══════════════════ HISTORY ═══════════════════
function loadHist() { try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; } }
function saveHist(h) { localStorage.setItem(HIST_KEY, JSON.stringify(h)); }

function saveHistory(item) {
  const h = loadHist();
  h.unshift(item);
  saveHist(h);
  renderHistory();
}

function removeHist(id) {
  saveHist(loadHist().filter(x => x.id !== id));
  renderHistory();
}

function renderHistory() {
  const h = loadHist();
  document.getElementById('histCount').textContent = h.length;
  const body = document.getElementById('histBody');
  const empty = document.getElementById('emptyHist');
  if (h.length === 0) {
    body.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  body.innerHTML = h.map(x =>
    `<tr><td>${esc(x.note)}</td>
     <td class="key-cell">${esc(x.key)}</td>
     <td>${esc(x.expStr)}</td>
     <td><button class="del-btn" onclick="removeHist('${x.id}')">Remove</button></td></tr>`
  ).join('');
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
window.removeHist = removeHist;
</script>
</body>
</html>
